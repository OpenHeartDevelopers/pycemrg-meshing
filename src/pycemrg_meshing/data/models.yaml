    "2.0.0-beta.2":
      url: "https://github.com/OpenHeartDevelopers/meshtools3d/releases/download/v2.0.0-beta.2/meshtools3d-2.0.0-beta.2-linux-x86_64.tar.gz"
      sha256: "3420f7756b23f1dcf464a0c2777ac6a288d3e02ae2af1afbb0c7dd09cd25710a"
