# meshtools3d binary manifest, consumed by pycemrg.ModelManager.
#
# Two entries per platform, sharing one tarball URL: one resolves the
# `meshtools3d` binary, the other `laplace_solver`. ModelManager caches
# downloads by URL + sha256, so the archive is fetched once.
#
# The bundled `lib/` directory next to `bin/` ships shared libraries
# (libtbb, libgmp, libmpfr, ...). Runners must inject the corresponding
# library-path env var (DYLD_LIBRARY_PATH on macOS, LD_LIBRARY_PATH on
# Linux) before invoking either binary.

meshtools3d-linux-x86_64:
  default: "2.0.0"
  versions:
    "2.0.0":
      url: "https://github.com/OpenHeartDevelopers/meshtools3d/releases/download/v2.0.0/meshtools3d-2.0.0-linux-x86_64.tar.gz"
      sha256: "e29b4d7188d50c505b3c6b302005a14d25fc86c718e4c7caaaf314c9224c72fc"  # shared with laplace_solver-linux-x86_64
      unzipped_target_path: "meshtools3d-2.0.0-linux-x86_64/bin/meshtools3d"
    "2.0.0-beta.2":
      url: "https://github.com/OpenHeartDevelopers/meshtools3d/releases/download/v2.0.0-beta.2/meshtools3d-2.0.0-beta.2-linux-x86_64.tar.gz"
      sha256: "3420f7756b23f1dcf464a0c2777ac6a288d3e02ae2af1afbb0c7dd09cd25710a"
      unzipped_target_path: "meshtools3d-2.0.0-beta.2-linux-x86_64/bin/meshtools3d"

laplace_solver-linux-x86_64:
  default: "2.0.0"
  versions:
    "2.0.0":
      url: "https://github.com/OpenHeartDevelopers/meshtools3d/releases/download/v2.0.0/meshtools3d-2.0.0-linux-x86_64.tar.gz"
      sha256: "e29b4d7188d50c505b3c6b302005a14d25fc86c718e4c7caaaf314c9224c72fc"  # shared with meshtools3d-linux-x86_64
