# Documentation site config for a pycemrg-suite library.
# The theme / markdown_extensions / plugins blocks are intentionally generic —
# keep them identical across the suite so every library shares the same look.

site_name: pycemrg-meshing
site_description: Python wrapper for the meshtools3d C++ binaries (meshtools3d, laplace_solver) — CEMRG, Imperial College London
site_url: https://openheartdevelopers.github.io/pycemrg-meshing/
repo_url: https://github.com/OpenHeartDevelopers/pycemrg-meshing
repo_name: OpenHeartDevelopers/pycemrg-meshing

theme:
  name: material
  palette:
    # Give each library its own primary/accent colour so they are visually
    # distinct but clearly part of one suite. (image-analysis uses red.)
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  # Optional: auto-generate API reference from docstrings. Uncomment and add
  # `mkdocstrings[python]` to the docs install step in .github/workflows/docs.yml.
  # - mkdocstrings:
  #     handlers:
  #       python:
  #         options:
  #           show_source: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

# Standard suite nav spine. Sections this library does not yet have
# (Getting Started, Tutorials) are omitted; ordering is kept for consistency.
nav:
  - Home: index.md
  - Architecture: api/overview.md
  - API Reference:
    - api/index.md
  - CLI: cli/index.md
  - Developer Guides:
    - macOS Gatekeeper: macos_gatekeeper.md
    - Adding M3D binaries: add_new_m3d_binaries.md
